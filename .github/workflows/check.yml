name: check

# Validates the ReaPack metadata headers on every push and pull request, so a malformed header (a bad
# @provides path, a blank line that prematurely ends the metadata block, a non-increasing @version, ...)
# fails loudly in CI instead of shipping a broken package. Does NOT commit anything.

on:
  push:
  pull_request:

jobs:
  reapack-index-check:
    runs-on: ubuntu-latest
    steps:
    - name: Fetch repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install Pandoc
      run:  sudo apt-get update && sudo apt-get install -yy pandoc
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
    - name: Install reapack-index
      run:  gem install reapack-index
    - name: Validate metadata headers
      run:  reapack-index --check
