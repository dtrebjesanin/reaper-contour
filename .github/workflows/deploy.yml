name: deploy

# Regenerates index.xml from the in-script ReaPack metadata headers (Contour/contour.lua) and commits it
# back to the repo. The index.xml is what users import into ReaPack. Release workflow is just: bump
# @version + @changelog in Contour/contour.lua, commit, push — this Action does the rest.
#
# Requires: Settings > Actions > General > Workflow permissions = "Read and write permissions"
# (or the permissions block below) so the bot can push index.xml.

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  reapack-index:
    runs-on: ubuntu-latest
    steps:
    - name: Fetch repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # reapack-index walks full history to build the version list
    - name: Configure git
      run: |-
        git config user.name  'Contour Bot'
        git config user.email 'contour-bot@users.noreply.github.com'
    - name: Install Pandoc
      run:  sudo apt-get update && sudo apt-get install -yy pandoc
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
    - name: Install reapack-index
      run:  gem install reapack-index
    - name: Update index.xml
      run:  reapack-index --commit --name 'Contour'
    - name: Push changes
      run:  git push
